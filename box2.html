<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        .box1{
            position: relative;
            margin: 40px auto;
            width: 1000px;
            height: 500px;
            background: darkgrey;
        }
        .box2{
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(90deg, deepskyblue, deeppink);
            box-shadow: 10px 5px 30px #555;
            border-radius: 200px;
            transition: scale 0.5s;
            animation: move 3s infinite alternate;
        }
        .box2:hover{
            scale: 1.1;
        }
        @keyframes move {
            0%{
                top: 0;
                left: 0;
            }
            50%{
                top: 300px;
                left: 0px;
            }
            80%{
                left: 800px;
                top: 300px;
            }
            100%{
                top: 0;
                left: 800px;
            }
            
        }
    </style>
</head>
<body>
    <div class="box1">
        <div class="box2"></div>
    </div>
</body>
</html>
