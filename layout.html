<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>
    <style>
        .container{
            margin: auto;
            width: 1000px;
            height: 500px;
        }
        header{
            height: 100px;
            background: deepskyblue;
        }
        main{
            display: flex;
        }
        nav{
            width: 200px;
            height: 200px;
            background: darkcyan;
        }
        article{
            width: 600px;
            height: 200px;
            background: darkgreen;
        }
        aside{
            height: 200px;
            width: 200px;
            background: darkorange;
        }
        footer{
            height: 100px;
            background: deeppink;
        }
        @media (max-width: 1000px){
            .container{
                width: 100%;
            }
            main{
                flex-wrap: wrap;
            }
            nav{
                width: 100%;
                height: 100px;
            }
            article, aside{
                width: 50%;
            }
        }
        @media (max-width: 600px){
            article, aside{
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header></header>
        <main>
            <nav></nav>
            <article></article>
            <aside></aside>
        </main>
        <footer></footer>
    </div>
</body>
</html>
