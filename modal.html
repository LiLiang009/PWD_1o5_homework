<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
    <style>
        body{
            font-family: sans-serif;
            font-size: 1.5em;
            max-width: 1000px;
            margin: 0 auto;
        }
        #backdrop{
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0.5;
            display: none;
        }
        #modal{
            position: absolute;
            top: -350px;
            left: 30%;
            width: 400px;
            height: 200px;
            background: #333;
            border-radius: 15px;
            transition: top 0.5s;
            
        }
        #modal h2{
            font-size: 1em;
            color: white;
            margin: 0;
            padding: 10px;
            background: #222;
            border-radius: 10px 10px 0 0;
        }
        #modal h2 a{
            color: white;
            float: right;
            text-decoration: none;

        }
        #modal h2 a:hover{
            
            border: 2px white solid;
            border-radius: 5px;
            opacity: 0.7;
        

        }
    </style>
</head>
<body>
    <h1>Home Page</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Dolore assumenda blanditiis expedita. Voluptas error sint ad fugiat ipsa architecto ut quam, numquam aliquid eveniet ullam molestiae similique exercitationem eos. Tempore!</p>
    <button onclick="show()">Button</button>
    <div id="backdrop" onclick="hide()"></div>
    <div id="modal">
        <h2>Modal Title <a href="#" onclick="hide()">&times;</a></h2>
    </div>
    <script>
        function show(){
            document.querySelector("#backdrop").style.display = "block";
            document.querySelector("#modal").style.top = "100px";
        }
        function hide(){
            document.querySelector("#backdrop").style.display = "none";
            document.querySelector("#modal").style.top = "-350px";
        }
    </script>
</body>
</html>
