<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab</title>
    <style>
        .tabs{
            display: flex;
            list-style: none;
            margin: auto;
            gap: 8px;
            padding: 10px 10px 0 10px;
            background: darkslateblue;
        }
        .tabs li{
            padding: 10px;
            
            background: white;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
        }
        #tab2{
            opacity: 0.5;
        }
        .box{
            min-height: 400px;
            padding: 10px;
            border: 10px solid darkslateblue;
            border-top: 0;
        }
        #box2{
            display: none;
        }
    </style>
</head>
<body>
    <ul class="tabs">
        <li id="tab1" onclick="box1()">Tab One</li>
        <li id="tab2" onclick="box2()">Tab Two</li>
    </ul>
    <div class="box" id="box1">Box One</div>
    <div class="box" id="box2">Box Two</div>
    <script>
        function box1(){
            document.querySelector("#box1").style.display = "block";
            document.querySelector("#box2").style.display = "none";
            document.querySelector("#tab1").style.opacity = "1";
            document.querySelector("#tab2").style.opacity = "0.5";

        }
        function box2(){
            document.querySelector("#box1").style.display = "none";
            document.querySelector("#box2").style.display = "block";
            document.querySelector("#tab1").style.opacity = "0.5";
            document.querySelector("#tab2").style.opacity = "1";

        }
    </script>
</body>
</html>
